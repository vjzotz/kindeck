<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kindeck lite</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   ESTILOS — paleta de marca de kindeck lite
   ========================================================== */
:root{
  --bg:#0d0e10; --panel:#16171a; --text:#e7e7ea; --muted:#8a8a92;
  --sage:#637e77; --amber:#ff9f0a; --border:#2a2c30;
  --mono:'JetBrains Mono', monospace; --sans:'Inter', -apple-system, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--text); font-family:var(--sans);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; text-align:center;
}
.logo{ height:44px; width:auto; opacity:0; animation:fadeUp .6s .1s forwards; }
p.sub{ font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:20px; max-width:440px; opacity:0; animation:fadeUp .6s .2s forwards; }
.status{ font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:22px; display:flex; align-items:center; gap:10px; opacity:0; animation:fadeUp .6s .3s forwards; }
.spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--border); border-top-color:var(--amber); animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.options{ display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; justify-content:center; opacity:0; animation:fadeUp .6s .4s forwards; }
.opt{
  font-size:13px; border:1px solid var(--border); color:var(--text); padding:18px 24px; border-radius:2px;
  transition:.15s; min-width:160px; text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:6px;
  background: var(--panel);
}
.opt .flag{font-size:24px;}
.opt .name{font-family:var(--mono); font-weight:700; font-size:13px;}
.opt .cur{color:var(--muted); font-size:11px; font-family:var(--mono); letter-spacing:0.04em;}
.opt:hover, .opt:focus-visible{border-color:var(--sage); color:var(--sage); transform:translateY(-2px);}
.opt:hover .cur, .opt:focus-visible .cur{color:var(--sage);}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important;} }
</style>
</head>
<body>

<a href="../index.html" style="font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:0.04em;">← kindeck</a>
<img class="logo" src="assets/kindeck_lite_logo_full.png" alt="kindeck lite" style="margin-top:14px;">
<p class="sub">Detectando tu ubicación e idioma para mostrarte la versión correcta. También podés elegir manualmente.<br>Detecting your location and language to show you the right version. You can also choose manually.</p>

<div class="status"><span class="spin"></span><span id="status-text">Detectando región…</span></div>

<!-- ==========================================================
     OPCIONES MANUALES — una por cada versión/carpeta del sitio.
     ========================================================== -->
<div class="options">
  <a class="opt" href="ar/index.html" data-country="AR"><span class="flag">🇦🇷</span><span class="name">Argentina</span><span class="cur">ARS</span></a>
  <a class="opt" href="latam/index.html" data-lang="es"><span class="flag">🌎</span><span class="name">Latinoamérica</span><span class="cur">USD</span></a>
  <a class="opt" href="en/index.html" data-lang="en"><span class="flag">🇬🇧</span><span class="name">English</span><span class="cur">USD</span></a>
</div>

<script>
/* ==========================================================
   LÓGICA — router de país/idioma para kindeck lite
   ========================================================== */

const DEFAULT_TARGET = 'en/index.html'; // a dónde mandar si no matchea nada (país ni idioma)
const REDIRECT_DELAY_MS = 900;          // pausa antes de redirigir, para que se lea el mensaje de estado
const FETCH_TIMEOUT_MS = 2500;          // cuánto esperar la respuesta de geolocalización antes de rendirse

let redirected = false;

document.querySelectorAll('.opt').forEach(a => {
  a.addEventListener('click', () => { redirected = true; });
});

function goTo(href, statusText) {
  if (redirected) return;
  redirected = true;
  setStatus(statusText);
  setTimeout(() => { window.location.href = href; }, REDIRECT_DELAY_MS);
}

function setStatus(text) {
  const el = document.getElementById('status-text');
  if (el) el.textContent = text;
}

function decideByLanguage() {
  const lang = (navigator.language || 'en').toLowerCase();
  const opts = document.querySelectorAll('.opt[data-lang]');
  for (const opt of opts) {
    if (lang.startsWith(opt.dataset.lang)) {
      goTo(opt.getAttribute('href'), `Redirigiendo a ${opt.querySelector('.name').textContent.trim()}…`);
      return;
    }
  }
  goTo(DEFAULT_TARGET, 'Redirecting…');
}

function decideByCountry(countryCode) {
  const opts = document.querySelectorAll('.opt[data-country]');
  for (const opt of opts) {
    if (opt.dataset.country === countryCode) {
      goTo(opt.getAttribute('href'), `Redirigiendo a ${opt.querySelector('.name').textContent.trim()}…`);
      return;
    }
  }
  decideByLanguage();
}

// Detección por IP con timeout corto; si falla o tarda, cae a idioma del navegador.
// Usa ipapi.co (gratis, sin API key, límite generoso para sitios chicos).
const controller = new AbortController();
const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

fetch('https://ipapi.co/json/', { signal: controller.signal })
  .then(r => r.json())
  .then(data => {
    clearTimeout(timeoutId);
    const country = data && data.country_code ? data.country_code.toUpperCase() : null;
    if (country) decideByCountry(country);
    else decideByLanguage();
  })
  .catch(() => {
    clearTimeout(timeoutId);
    decideByLanguage();
  });
</script>

</body>
</html>
