<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kindeck</title>
<link rel="icon" type="image/x-icon" href="lite/assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   ESTILOS — paleta de marca de kindeck
   ========================================================== */
:root{
  --bg:#0d0e10; --panel:#16171a; --text:#e7e7ea; --muted:#8a8a92;
  --sage:#637e77; --amber:#ff9f0a; --border:#2a2c30;
  --mono:'JetBrains Mono', monospace; --sans:'Inter', -apple-system, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--text); font-family:var(--sans);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; text-align:center;
}
.logo{ height:40px; width:auto; opacity:0; animation:fadeUp .6s .1s forwards; }
p.sub{ font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:20px; max-width:440px; opacity:0; animation:fadeUp .6s .2s forwards; }
.status{ font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:22px; display:flex; align-items:center; gap:10px; opacity:0; animation:fadeUp .6s .3s forwards; }
.spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--border); border-top-color:var(--amber); animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.options{ display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; justify-content:center; opacity:0; animation:fadeUp .6s .4s forwards; }
.opt{
  font-size:13px; border:1px solid var(--border); color:var(--text); padding:18px 24px; border-radius:2px;
  transition:.15s; min-width:160px; text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:6px;
  background: var(--panel);
}
.opt .flag{font-size:24px;}
.opt .name{font-family:var(--mono); font-weight:700; font-size:13px;}
.opt:hover, .opt:focus-visible{border-color:var(--sage); color:var(--sage); transform:translateY(-2px);}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important;} }
</style>
</head>
<body>

<img class="logo" src="assets/logo-kindeck-general.svg" alt="kindeck">
<p class="sub">Detectando tu idioma para mostrarte la versión correcta. También podés elegir manualmente.<br>Detecting your language to show you the right version. You can also choose manually.</p>

<div class="status"><span class="spin"></span><span id="status-text">Detectando idioma…</span></div>

<!-- ==========================================================
     OPCIONES MANUALES
     ========================================================== -->
<div class="options">
  <a class="opt" href="es/index.html" data-lang="es"><span class="flag">🌎</span><span class="name">Español</span></a>
  <a class="opt" href="en/index.html" data-lang="en"><span class="flag">🇬🇧</span><span class="name">English</span></a>
</div>

<script>
/* ==========================================================
   LÓGICA — router de idioma para la raíz de kindeck
   ========================================================== */

const DEFAULT_TARGET = 'en/index.html'; // a dónde mandar si no matchea nada
const REDIRECT_DELAY_MS = 900;

let redirected = false;

document.querySelectorAll('.opt').forEach(a => {
  a.addEventListener('click', () => { redirected = true; });
});

function goTo(href, statusText) {
  if (redirected) return;
  redirected = true;
  setStatus(statusText);
  setTimeout(() => { window.location.href = href; }, REDIRECT_DELAY_MS);
}

function setStatus(text) {
  const el = document.getElementById('status-text');
  if (el) el.textContent = text;
}

function decideByLanguage() {
  const lang = (navigator.language || 'en').toLowerCase();
  const opts = document.querySelectorAll('.opt[data-lang]');
  for (const opt of opts) {
    if (lang.startsWith(opt.dataset.lang)) {
      goTo(opt.getAttribute('href'), `Redirigiendo a ${opt.querySelector('.name').textContent.trim()}…`);
      return;
    }
  }
  goTo(DEFAULT_TARGET, 'Redirecting…');
}

// Español/inglés no necesita geo-IP (no hay precio de por medio acá, solo
// idioma) — decide directo por el idioma del navegador.
decideByLanguage();
</script>

</body>
</html>
